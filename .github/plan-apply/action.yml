name: "Terraform plan and apply"
description: "Init, plan, and apply in one runner session (no S3 plan artifact)"
inputs:
  terraform_directory:
    description: "Directory that holds Terraform code"
    required: true
  terraform_version:
    description: "Terraform Version"
    required: true
  PAT:
    description: "GitHub token for auth"
    required: true
  aws_access_key_id:
    description: "AWS Access Key ID"
    required: true
  aws_secret_access_key:
    description: "AWS Secret Access Key"
    required: true
  aws_region:
    description: "AWS Region"
    required: true
  tf_var_env:
    description: "Terraform environment. If not set, taken from tf_vars_json.env or defaults to dev"
    required: false
  tf_vars_json:
    description: 'JSON object mapping Terraform variable names to values, e.g. {"env":"dev"}'
    required: false
  backend_config_file:
    description: 'Backend config path relative to terraform_directory. Default env/backend_s3_${env}.hcl'
    required: false
  refresh:
    description: "Whether to refresh state before planning"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}
        terraform_wrapper: false

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ inputs.aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
        aws-region: ${{ inputs.aws_region }}

    - name: Resolve Environment
      id: resolve-env
      shell: bash
      env:
        TF_VAR_ENV_INPUT: ${{ inputs.tf_var_env }}
        TF_VARS_JSON: ${{ inputs.tf_vars_json }}
      run: |
        set -Eeuo pipefail
        ENV_NAME="${TF_VAR_ENV_INPUT}"
        if [ -z "$ENV_NAME" ] && [ -n "${TF_VARS_JSON:-}" ]; then
          ENV_NAME=$(echo "$TF_VARS_JSON" | jq -r '.env // empty')
        fi
        if [ -z "$ENV_NAME" ]; then
          ENV_NAME="dev"
        fi
        echo "TF_VAR_env=$ENV_NAME" >> "$GITHUB_ENV"
        echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
        echo "Resolved environment: $ENV_NAME"

    - name: Terraform Init
      working-directory: ${{ inputs.terraform_directory }}
      shell: bash
      env:
        BACKEND_CONFIG_FILE: ${{ inputs.backend_config_file }}
      run: |
        set -Eeuo pipefail
        BACKEND_FILE="${BACKEND_CONFIG_FILE}"
        if [ -z "$BACKEND_FILE" ]; then
          BACKEND_FILE="env/backend_s3_${TF_VAR_env}.hcl"
        fi
        echo "Using backend config: $BACKEND_FILE"
        terraform init -upgrade -no-color --backend-config="$BACKEND_FILE"

    - name: Export Core TF Vars
      shell: bash
      run: |
        {
          echo "TF_VAR_aws_access_key_id=${{ inputs.aws_access_key_id }}";
          echo "TF_VAR_aws_secret_access_key=${{ inputs.aws_secret_access_key }}";
          echo "TF_VAR_aws_region=${{ inputs.aws_region }}";
        } >> "$GITHUB_ENV"

    - name: Export TF Vars from JSON
      shell: bash
      env:
        TF_VARS_JSON: ${{ inputs.tf_vars_json }}
      run: |
        set -Eeuo pipefail
        if [ -n "${TF_VARS_JSON:-}" ]; then
          JSON_TYPE=$(echo "$TF_VARS_JSON" | jq -r 'type' || true)
          if [ "$JSON_TYPE" != "object" ]; then
            echo "tf_vars_json must be a JSON object; got type: $JSON_TYPE" >&2
            exit 1
          fi
          echo "$TF_VARS_JSON" | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> "$GITHUB_ENV"
        fi

    - name: Terraform Plan and Apply
      working-directory: ${{ inputs.terraform_directory }}
      shell: bash
      env:
        REFRESH: ${{ inputs.refresh }}
      run: |
        set -Eeuo pipefail
        echo "Terraform version: $(terraform version | head -n1)"
        echo "Applying terraform plan..."
        terraform apply -auto-approve